<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | RIE IWAMOTO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ===== LOGIN SCREEN ===== -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <p class="login-logo-en">RIE IWAMOTO</p>
        <p class="login-logo-sub">管理画面</p>
      </div>
      <form class="login-form" id="login-form" autocomplete="off">
        <div class="login-input-group">
          <label for="login-password">パスワード</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <p class="login-error" id="login-error" style="display:none">パスワードが違います</p>
        <button type="submit" class="login-btn">ログイン</button>
      </form>
      <a href="index.html" class="login-back">← 公開サイトへ戻る</a>
    </div>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <div class="dashboard" id="dashboard" style="display:none">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <p class="sidebar-logo-en">RIE IWAMOTO</p>
        <p class="sidebar-logo-sub">管理画面</p>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-link active" data-tab="schedule">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          スケジュール
        </button>
        <button class="sidebar-link" data-tab="reservations">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          予約管理
        </button>
        <button class="sidebar-link" data-tab="customers">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          顧客管理
        </button>
        <button class="sidebar-link" data-tab="analytics">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          売上分析
        </button>
        <button class="sidebar-link" data-tab="holidays">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="15" x2="16" y2="15"/></svg>
          休日管理
        </button>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html" class="sidebar-public-link">← 公開サイト</a>
        <button class="sidebar-logout" id="logout-btn">ログアウト</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="topbar">
        <button class="topbar-menu" id="topbar-menu" aria-label="メニュー">
          <span></span><span></span><span></span>
        </button>
        <h1 class="topbar-title" id="topbar-title">スケジュール</h1>
        <div class="topbar-date" id="topbar-date"></div>
      </div>

      <!-- ===== SCHEDULE TAB ===== -->
      <div class="tab-content active" id="tab-schedule">
        <div class="tab-header">
          <h2 class="tab-heading">今週のスケジュール</h2>
          <div class="week-nav">
            <button class="week-btn" id="week-prev">&#8249;</button>
            <span id="week-label"></span>
            <button class="week-btn" id="week-next">&#8250;</button>
          </div>
        </div>
        <div class="schedule-container">
          <div class="schedule-header" id="schedule-header"></div>
          <div class="schedule-grid" id="schedule-grid"></div>
        </div>
        <div class="schedule-legend">
          <span class="legend-item unconfirmed">未確認</span>
          <span class="legend-item confirmed">確認済</span>
          <span class="legend-item completed">完了</span>
          <span class="legend-item cancelled">キャンセル</span>
        </div>
      </div>

      <!-- ===== RESERVATIONS TAB ===== -->
      <div class="tab-content" id="tab-reservations">
        <div class="tab-header">
          <h2 class="tab-heading">予約管理</h2>
          <div class="filter-row">
            <button class="filter-btn active" data-filter="all">すべて</button>
            <button class="filter-btn" data-filter="unconfirmed">未確認</button>
            <button class="filter-btn" data-filter="confirmed">確認済</button>
            <button class="filter-btn" data-filter="completed">完了</button>
            <button class="filter-btn" data-filter="cancelled">キャンセル</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="res-table" id="res-table">
            <thead>
              <tr>
                <th>日時</th>
                <th>お名前</th>
                <th>メニュー</th>
                <th>金額</th>
                <th>電話</th>
                <th>ステータス</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="res-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- ===== CUSTOMERS TAB ===== -->
      <div class="tab-content" id="tab-customers">
        <div class="tab-header">
          <h2 class="tab-heading">顧客管理</h2>
          <div class="search-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="customer-search" class="search-input" placeholder="名前で検索…">
          </div>
        </div>
        <div class="customer-grid" id="customer-grid"></div>
      </div>

      <!-- ===== ANALYTICS TAB ===== -->
      <div class="tab-content" id="tab-analytics">
        <div class="tab-heading-only">
          <h2 class="tab-heading">売上分析</h2>
        </div>
        <div class="kpi-row">
          <div class="kpi-card">
            <p class="kpi-label">今月の売上</p>
            <p class="kpi-value" id="kpi-month">¥0</p>
          </div>
          <div class="kpi-card">
            <p class="kpi-label">今月の予約数</p>
            <p class="kpi-value" id="kpi-count">0</p>
          </div>
          <div class="kpi-card">
            <p class="kpi-label">客単価（今月）</p>
            <p class="kpi-value" id="kpi-avg">¥0</p>
          </div>
          <div class="kpi-card">
            <p class="kpi-label">累計顧客数</p>
            <p class="kpi-value" id="kpi-customers">0</p>
          </div>
        </div>
        <div class="chart-grid">
          <div class="chart-card chart-card-wide">
            <h3 class="chart-title">月別売上推移</h3>
            <div class="chart-wrap"><canvas id="chart-monthly"></canvas></div>
          </div>
          <div class="chart-card">
            <h3 class="chart-title">メニュー別売上</h3>
            <div class="chart-wrap chart-pie"><canvas id="chart-menu"></canvas></div>
          </div>
        </div>
      </div>

      <!-- ===== HOLIDAYS TAB ===== -->
      <div class="tab-content" id="tab-holidays">
        <div class="tab-header">
          <h2 class="tab-heading">休日管理</h2>
          <div class="holiday-month-nav">
            <button class="week-btn" id="hol-prev">&#8249;</button>
            <span id="hol-month-label" style="font-size:0.9rem;color:var(--text-mid);min-width:7em;text-align:center"></span>
            <button class="week-btn" id="hol-next">&#8250;</button>
          </div>
        </div>
        <p style="font-size:0.82rem;color:var(--text-light);margin-bottom:1rem;">日付をタップすると休日（予約不可）に設定できます。もう一度タップで解除。</p>
        <div class="holiday-cal-wrap">
          <div class="holiday-cal-head">
            <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span><span>日</span>
          </div>
          <div class="holiday-cal-grid" id="hol-cal-grid"></div>
        </div>
        <div style="margin-top:1.25rem;">
          <p style="font-size:0.82rem;color:var(--text-mid);margin-bottom:0.5rem;">登録済み休日：</p>
          <div id="hol-list" style="display:flex;flex-wrap:wrap;gap:0.4rem;"></div>
        </div>
      </div>

    </main>
  </div>

  <!-- 予約詳細モーダル -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal-card">
      <div class="modal-header">
        <h3 class="modal-title">予約詳細</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <div class="status-select-wrap">
          <label>ステータス変更：</label>
          <select id="modal-status-select" class="modal-select">
            <option value="unconfirmed">未確認</option>
            <option value="confirmed">確認済</option>
            <option value="completed">完了</option>
            <option value="cancelled">キャンセル</option>
          </select>
        </div>
        <button class="btn-modal-save" id="modal-save">保存</button>
        <button class="btn-modal-cancel" id="modal-cancel">閉じる</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
